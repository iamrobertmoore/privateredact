# Netlify config for Private Redaction.
# Frontend is served statically; the verifier runs as a serverless function so
# the nilAI key stays server-side (set NILAI_API_KEY in Netlify env vars).

[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

# The browser calls /api/verify (same origin); Netlify routes it to the function.
[[redirects]]
  from = "/api/verify"
  to = "/.netlify/functions/verify"
  status = 200

# Don't serve source, tests, design mockups or internal docs from the deploy.
[[redirects]]
  from = "/server/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/test/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/design/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/netlify/*"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/README.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/DESIGN_BRIEF.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/ADVERSARIAL_REVIEW.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/ADVERSARIAL_REVIEW_FINDINGS.md"
  to = "/404.html"
  status = 404
  force = true
[[redirects]]
  from = "/config.example.js"
  to = "/404.html"
  status = 404
  force = true
